name = "pomodoro-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "pomodoro-db"
database_id = "pomodoro-db-id"

[[kv_namespaces]]
binding = "KV"
id = "pomodoro-kv-id"

[vars]
BETTER_AUTH_SECRET = "dev-secret-change-in-production"
BETTER_AUTH_URL = "http://localhost:8787"
