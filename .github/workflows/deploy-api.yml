name: Deploy API Cloudflare

on:
  push:
    branches:
      - master
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck API
        run: npx tsc --noEmit

      - name: Setup wrangler.jsonc
        run: |
          # Copiar wrangler.jsonc base
          cp wrangler.jsonc wrangler.deploy.jsonc
          
          # Substituir placeholders por secrets do GitHub
          if [ -n "${{ secrets.D1_DATABASE_ID }}" ]; then
            sed -i "s/D1_DATABASE_ID/${{ secrets.D1_DATABASE_ID }}/g" wrangler.deploy.jsonc
          fi
          
          if [ -n "${{ secrets.KV_NAMESPACE_ID }}" ]; then
            sed -i "s/KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/g" wrangler.deploy.jsonc
          fi

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config wrangler.deploy.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
